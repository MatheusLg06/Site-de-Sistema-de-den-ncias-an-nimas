<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Denúncias Anônimas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Denúncia Anônima</h1>
            <p>Sua identidade está protegida. Contribua para uma cidade melhor.</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('enviar')">Nova Denúncia</button>
            <button class="tab-btn" onclick="openTab('consultar')">Acompanhar Status</button>
        </div>

        <section id="enviar" class="tab-content active">
            <form id="denunciaForm">
                
                <div class="section-title">1. Selecione a Categoria</div>
                <div class="grid-categories">
                    <select id="categoria" required>
                        <option value="">Selecione uma categoria...</option>
                        <optgroup label="Segurança e Violência">
                            <option>Violência contra a mulher/criança/idoso</option>
                            <option>Furto/Roubo</option>
                            <option>Drogas / Atividade suspeita</option>
                        </optgroup>
                        <optgroup label="Direitos e Conduta">
                            <option>Assédio moral/sexual</option>
                            <option>Bullying/Cyberbullying</option>
                            <option>Discriminação / Direitos humanos</option>
                        </optgroup>
                        <optgroup label="Meio Ambiente e Bem-Estar">
                            <option>Maus-tratos a animais</option>
                            <option>Crimes ambientais</option>
                            <option>Perturbação do sossego</option>
                        </optgroup>
                        <optgroup label="Cidade e Serviços">
                            <option>Infraestrutura / Serviços públicos</option>
                            <option>Transporte e trânsito</option>
                            <option>Irregularidades escolares</option>
                        </optgroup>
                    </select>
                </div>

                <div class="section-title">2. Localização</div>
                <div class="input-group">
                    <input type="text" id="rua" placeholder="Rua" required>
                    <input type="text" id="bairro" placeholder="Bairro" required>
                    <input type="text" id="referencia" placeholder="Ponto de Referência">
                </div>

                <div class="section-title">3. Evidências</div>
                <div class="file-upload">
                    <label for="arquivo">Anexar Imagem, Vídeo ou Documento:</label>
                    <input type="file" id="arquivo" accept="image/*,video/*,.pdf,.doc">
                </div>

                <div class="section-title">4. Descrição</div>
                <textarea id="descricao" rows="4" placeholder="Descreva os fatos detalhadamente..." required></textarea>

                <button type="submit" class="btn-send">Enviar Denúncia</button>
            </form>

            <div id="resultado" class="hidden">
                <div class="protocol-card">
                    <h3>Denúncia Enviada com Sucesso!</h3>
                    <p>Guarde seu número de protocolo para consulta:</p>
                    <strong id="protocoloGerado"></strong>
                </div>
            </div>
        </section>

        <section id="consultar" class="tab-content">
            <div class="section-title">Consultar Status</div>
            <div class="input-group">
                <input type="text" id="inputProtocolo" placeholder="Digite o número do protocolo">
                <button class="btn-send" onclick="consultarStatus()">Consultar</button>
            </div>
            <div id="statusResult" class="hidden">
                <div class="status-box">
                    Status Atual: <span id="txtStatus"></span>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
